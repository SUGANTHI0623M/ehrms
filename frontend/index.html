<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Askeva HRMS - Complete Human Resource Management System</title>
    <meta name="description" content="Comprehensive askeva HRMS for candidate management, hiring, onboarding, performance tracking, and payroll management. Streamline your HR operations." />
    <meta name="author" content="Askeva HRMS System" />

    <meta property="og:title" content="Askeva HRMS - Human Resource Management System" />
    <meta property="og:description" content="Complete HR solution for recruitment, employee management, and performance tracking." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      #root-fallback {
        --sk-bg: #f1f5f9;
        --sk-fg: #e2e8f0;
        --sk-shine: linear-gradient(90deg, var(--sk-fg) 0%, #f8fafc 50%, var(--sk-fg) 100%);
        margin: 0;
        min-height: 100vh;
        background: var(--sk-bg);
        font-family: 'Poppins', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
      }
      #root-fallback .sk-header {
        height: 56px;
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
        gap: 1rem;
      }
      #root-fallback .sk-logo {
        width: 120px;
        height: 28px;
        border-radius: 6px;
        background: var(--sk-fg);
        animation: sk-shimmer 1.8s ease-in-out infinite;
      }
      #root-fallback .sk-nav {
        flex: 1;
        height: 20px;
        max-width: 320px;
        border-radius: 4px;
        background: var(--sk-fg);
        animation: sk-shimmer 1.8s ease-in-out infinite 0.2s;
      }
      #root-fallback .sk-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--sk-fg);
        animation: sk-shimmer 1.8s ease-in-out infinite 0.4s;
      }
      #root-fallback .sk-body {
        flex: 1;
        display: flex;
      }
      #root-fallback .sk-sidebar {
        width: 240px;
        background: #fff;
        border-right: 1px solid #e2e8f0;
        padding: 1rem 0.75rem;
      }
      #root-fallback .sk-sidebar .sk-item {
        height: 36px;
        border-radius: 6px;
        background: var(--sk-fg);
        margin-bottom: 4px;
        animation: sk-shimmer 1.8s ease-in-out infinite;
      }
      #root-fallback .sk-sidebar .sk-item:nth-child(1) { animation-delay: 0s; }
      #root-fallback .sk-sidebar .sk-item:nth-child(2) { animation-delay: 0.1s; }
      #root-fallback .sk-sidebar .sk-item:nth-child(3) { animation-delay: 0.2s; }
      #root-fallback .sk-sidebar .sk-item:nth-child(4) { animation-delay: 0.3s; }
      #root-fallback .sk-sidebar .sk-item:nth-child(5) { animation-delay: 0.4s; }
      #root-fallback .sk-main {
        flex: 1;
        padding: 1.5rem 2rem;
      }
      #root-fallback .sk-title {
        height: 28px;
        width: 220px;
        border-radius: 6px;
        background: var(--sk-fg);
        margin-bottom: 1.5rem;
        animation: sk-shimmer 1.8s ease-in-out infinite 0.15s;
      }
      #root-fallback .sk-card {
        background: #fff;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }
      #root-fallback .sk-line {
        height: 14px;
        border-radius: 4px;
        background: var(--sk-fg);
        margin-bottom: 10px;
        animation: sk-shimmer 1.8s ease-in-out infinite;
      }
      #root-fallback .sk-line.short { width: 45%; }
      #root-fallback .sk-line.medium { width: 70%; }
      #root-fallback .sk-line.long { width: 95%; }
      @keyframes sk-shimmer {
        0%, 100% { opacity: 0.65; }
        50% { opacity: 1; }
      }
      @media (max-width: 768px) {
        #root-fallback .sk-sidebar { width: 64px; }
        #root-fallback .sk-sidebar .sk-item { width: 100%; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="root-fallback">
        <div class="sk-header">
          <div class="sk-logo"></div>
          <div class="sk-nav"></div>
          <div class="sk-avatar"></div>
        </div>
        <div class="sk-body">
          <div class="sk-sidebar">
            <div class="sk-item"></div>
            <div class="sk-item"></div>
            <div class="sk-item"></div>
            <div class="sk-item"></div>
            <div class="sk-item"></div>
          </div>
          <div class="sk-main">
            <div class="sk-title"></div>
            <div class="sk-card">
              <div class="sk-line long"></div>
              <div class="sk-line medium"></div>
              <div class="sk-line short"></div>
            </div>
            <div class="sk-card">
              <div class="sk-line long"></div>
              <div class="sk-line long"></div>
              <div class="sk-line medium"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
